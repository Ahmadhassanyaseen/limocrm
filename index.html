<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 618" width="1100" height="618" role="img" aria-label="Network and notification animation">
  <defs>
    <!-- Background gradients -->
    <radialGradient id="bg1" cx="60%" cy="45%" r="75%">
      <stop offset="0%" stop-color="rgba(30,70,200,0.22)"/>
      <stop offset="58%" stop-color="rgba(5,10,40,0)"/>
      <stop offset="100%" stop-color="rgba(5,10,40,0)"/>
    </radialGradient>

    <radialGradient id="bg2" cx="40%" cy="55%" r="70%">
      <stop offset="0%" stop-color="rgba(15,40,140,0.18)"/>
      <stop offset="58%" stop-color="rgba(5,10,40,0)"/>
      <stop offset="100%" stop-color="rgba(5,10,40,0)"/>
    </radialGradient>

    <radialGradient id="bg3" cx="50%" cy="50%" r="90%">
      <stop offset="0%" stop-color="#050a2a"/>
      <stop offset="65%" stop-color="#02051a"/>
      <stop offset="100%" stop-color="#01010a"/>
    </radialGradient>

    <!-- Stars pattern (subtle) -->
    <pattern id="stars" width="220" height="220" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="40" r="1.2" fill="rgba(255,255,255,.18)"/>
      <circle cx="52" cy="130" r="1.1" fill="rgba(255,255,255,.14)"/>
      <circle cx="90" cy="66" r="0.9" fill="rgba(255,255,255,.12)"/>
      <circle cx="124" cy="42" r="1.1" fill="rgba(255,255,255,.12)"/>
      <circle cx="162" cy="86" r="0.9" fill="rgba(255,255,255,.10)"/>
      <circle cx="190" cy="36" r="1.0" fill="rgba(255,255,255,.10)"/>
      <circle cx="198" cy="144" r="0.9" fill="rgba(255,255,255,.10)"/>
      <circle cx="170" cy="172" r="0.9" fill="rgba(255,255,255,.08)"/>
      <circle cx="72" cy="184" r="0.9" fill="rgba(255,255,255,.08)"/>
    </pattern>

    <!-- Node styles -->
    <radialGradient id="nodeHi" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,.02)"/>
    </radialGradient>

    <linearGradient id="nodeBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,.03)"/>
    </linearGradient>

    <!-- Center node glow -->
    <radialGradient id="centerHi" cx="35%" cy="25%" r="70%">
      <stop offset="0%" stop-color="rgba(120,170,255,.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,.02)"/>
    </radialGradient>
    <linearGradient id="centerBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(90,140,255,.16)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,.03)"/>
    </linearGradient>

    <!-- Wire colors -->
    <style>
      :root{
        --wire: rgba(255,255,255,.12);
        --flow: rgba(62,180,255,.95);
        --flowGlow: rgba(62,180,255,.35);
        --text: rgba(255,255,255,.70);
        --muted: rgba(255,255,255,.45);
      }

      /* Scene switching: 6s network, 5s notify, with fades (total ~12.2s loop) */
      .netScene { animation: sceneNet 12.2s linear infinite; }
      .notScene { animation: sceneNot 12.2s linear infinite; }

      @keyframes sceneNet{
        0%   { opacity:1; }
        45%  { opacity:1; }     /* ~5.5s */
        50%  { opacity:0; }     /* fade out */
        90%  { opacity:0; }     /* stay hidden during notify */
        100% { opacity:1; }     /* fade in at loop end */
      }

      @keyframes sceneNot{
        0%   { opacity:0; }
        45%  { opacity:0; }
        50%  { opacity:1; }     /* fade in */
        90%  { opacity:1; }     /* visible for ~5s-ish */
        100% { opacity:0; }     /* fade out */
      }

      /* Wire base */
      .wireBase{ stroke: var(--wire); stroke-width:2; fill:none; }

      /* Flow wire */
      .wireFlow{
        stroke: var(--flow);
        stroke-width:2.2;
        fill:none;
        stroke-linecap:round;
        stroke-dasharray: 70 210;
        filter: drop-shadow(0 0 6px var(--flowGlow));
        animation: flowMove 3.2s linear infinite;
      }
      .d1{ animation-duration:2.4s; animation-delay:0s;}
      .d2{ animation-duration:3.1s; animation-delay:.25s;}
      .d3{ animation-duration:2.8s; animation-delay:.55s;}
      .d4{ animation-duration:3.7s; animation-delay:.15s;}
      .d5{ animation-duration:2.2s; animation-delay:.80s;}
      .d6{ animation-duration:3.4s; animation-delay:.35s;}
      .d7{ animation-duration:2.9s; animation-delay:.95s;}

      @keyframes flowMove{
        0%   { stroke-dashoffset: 280; opacity:0; }
        10%  { opacity:1; }
        100% { stroke-dashoffset: 0; opacity:1; }
      }

      /* Node */
      .nodeCircle{
        stroke: rgba(255,255,255,.08);
        stroke-width:1;
      }

      /* Labels */
      .label1{ font: 600 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: rgba(255,255,255,.70); }
      .label2{ font: 500 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: rgba(255,255,255,.50); }

      /* Vignette */
      .vignette{ fill: url(#vig); }

      /* Notification card animation (3-slot stack) */
      .card{
        opacity:0;
        filter: blur(.6px);
        transform-box: fill-box;
        transform-origin: center;
      }

      /* Each loop starts at notify window (50%->90%). We animate within that window. */
      .c1{ animation: card1 12.2s linear infinite; }
      .c2{ animation: card2 12.2s linear infinite; }
      .c3{ animation: card3 12.2s linear infinite; }

      /* Slots: top=0, mid=96, bot=192 (like your CSS) */
      @keyframes card1{
        0%,45% { opacity:0; transform: translate(0,-24px) scale(.995); }
        50% { opacity:1; transform: translate(0,0px) scale(1); filter: blur(0); }
        62% { opacity:.86; transform: translate(0,96px) scale(.985); filter: blur(.12px); }
        74% { opacity:.70; transform: translate(0,192px) scale(.965); filter: blur(.35px); }
        88% { opacity:0; transform: translate(0,262px) scale(.96); filter: blur(.7px); }
        100% { opacity:0; }
      }

      @keyframes card2{
        0%,52% { opacity:0; transform: translate(0,-24px) scale(.995); }
        54% { opacity:1; transform: translate(0,0px) scale(1); filter: blur(0); }
        66% { opacity:.86; transform: translate(0,96px) scale(.985); filter: blur(.12px); }
        78% { opacity:.70; transform: translate(0,192px) scale(.965); filter: blur(.35px); }
        90% { opacity:0; transform: translate(0,262px) scale(.96); filter: blur(.7px); }
        100% { opacity:0; }
      }

      @keyframes card3{
        0%,56% { opacity:0; transform: translate(0,-24px) scale(.995); }
        58% { opacity:1; transform: translate(0,0px) scale(1); filter: blur(0); }
        70% { opacity:.86; transform: translate(0,96px) scale(.985); filter: blur(.12px); }
        82% { opacity:.70; transform: translate(0,192px) scale(.965); filter: blur(.35px); }
        92% { opacity:0; transform: translate(0,262px) scale(.96); filter: blur(.7px); }
        100% { opacity:0; }
      }
    </style>

    <!-- Vignette gradient -->
    <radialGradient id="vig" cx="50%" cy="50%" r="75%">
      <stop offset="58%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,.35)"/>
    </radialGradient>

    <!-- Card bg -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,.04)"/>
    </linearGradient>

    <linearGradient id="iconBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,.09)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,.03)"/>
    </linearGradient>

    <!-- Tiny drop shadow -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="rgba(0,0,0,.55)"/>
    </filter>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="rgba(0,0,0,.50)"/>
    </filter>

    <!-- Center logo-ish gradient -->
    <linearGradient id="pnl" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#07C983"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <filter id="centerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#5a8cff" flood-opacity="0.30"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#5a8cff" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Stage background -->
  <rect x="0" y="0" width="1100" height="618" fill="url(#bg3)"/>
  <rect x="0" y="0" width="1100" height="618" fill="url(#bg1)"/>
  <rect x="0" y="0" width="1100" height="618" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1100" height="618" fill="url(#stars)" opacity=".55"/>

  <!-- =========================
       NETWORK SCENE
       ========================= -->
  <g class="netScene" opacity="1">
    <!-- Wires -->
    <g transform="translate(0,0)">
      <!-- base -->
      <path class="wireBase" d="M99 86 C 242 86, 352 220, 484 283" />
      <path class="wireBase" d="M99 185 C 258 190, 352 252, 484 283" />
      <path class="wireBase" d="M99 284 C 275 284, 363 283, 484 283" />
      <path class="wireBase" d="M99 407 C 275 395, 363 330, 484 283" />
      <path class="wireBase" d="M99 518 C 253 495, 363 363, 484 283" />
      <path class="wireBase" d="M484 283 C 671 258, 781 253, 913 247" />
      <path class="wireBase" d="M484 283 C 671 312, 781 345, 913 352" />

      <!-- flow -->
      <path class="wireFlow d1" d="M99 86  C 242 86, 352 220, 484 283" />
      <path class="wireFlow d2" d="M99 185 C 258 190, 352 252, 484 283" />
      <path class="wireFlow d3" d="M99 284 C 275 284, 363 283, 484 283" />
      <path class="wireFlow d4" d="M99 407 C 275 395, 363 330, 484 283" />
      <path class="wireFlow d5" d="M99 518 C 253 495, 363 363, 484 283" />
      <path class="wireFlow d6" d="M484 283 C 671 258, 781 253, 913 247" />
      <path class="wireFlow d7" d="M484 283 C 671 312, 781 345, 913 352" />
    </g>

    <!-- Left nodes -->
    <g>
      <!-- Helper: node (circle + simple icon) -->
      <g transform="translate(99 86)">
        <circle r="28" fill="url(#nodeBody)" class="nodeCircle"/>
        <circle r="28" fill="url(#nodeHi)" opacity=".9"/>
        <!-- pill-ish icon -->
        <g transform="rotate(-35)">
          <rect x="-8" y="-16" width="16" height="24" rx="8" fill="#39d98a"/>
          <rect x="-8" y="-2" width="16" height="2.5" fill="rgba(0,0,0,.22)"/>
          <rect x="-6" y="-14" width="6" height="10" rx="3" fill="rgba(255,255,255,.55)"/>
        </g>
      </g>

      <g transform="translate(99 185)">
        <circle r="28" fill="url(#nodeBody)" class="nodeCircle"/>
        <circle r="28" fill="url(#nodeHi)" opacity=".9"/>
        <!-- moon -->
        <path d="M6 -14c-7 2-12 9-12 17 0 10 8 18 18 18 2.4 0 4.6-.5 6.6-1.3-3.2 2.8-7.2 4.5-11.7 4.5-9.5 0-17.2-7.7-17.2-17.2 0-8.6 6.3-15.8 16.3-21.0z"
              fill="#b86bff" opacity=".95"/>
        <circle cx="10" cy="-6" r="3.2" fill="rgba(255,255,255,.45)"/>
      </g>

      <g transform="translate(99 284)">
        <circle r="28" fill="url(#nodeBody)" class="nodeCircle"/>
        <circle r="28" fill="url(#nodeHi)" opacity=".9"/>
        <!-- plane -->
        <path d="M-16 2 L18 -12c2-1 4 1 3 3L9 24c-1 2-4 2-5 0l-5-12-12-5c-2-1-2-4 0-5z"
              fill="#ff5a00" opacity=".95"/>
        <path d="M-1 14 L16 -3" stroke="rgba(0,0,0,.35)" stroke-width="2.2" stroke-linecap="round"/>
      </g>

      <g transform="translate(99 407)">
        <circle r="28" fill="url(#nodeBody)" class="nodeCircle"/>
        <circle r="28" fill="url(#nodeHi)" opacity=".9"/>
        <!-- R badge -->
        <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="rgba(0,0,0,.22)" stroke="rgba(124,58,237,.9)" stroke-width="1.6"/>
        <text x="-5" y="8" font-size="20" font-weight="700" fill="rgba(255,255,255,.75)" font-family="ui-sans-serif,system-ui">R</text>
      </g>

      <g transform="translate(99 518)">
        <circle r="28" fill="url(#nodeBody)" class="nodeCircle"/>
        <circle r="28" fill="url(#nodeHi)" opacity=".9"/>
        <!-- stripes -->
        <g fill="#ffb200" opacity=".95" transform="rotate(-35)">
          <rect x="-14" y="-10" width="28" height="4" rx="2"/>
          <rect x="-16" y="-2" width="32" height="4" rx="2"/>
          <rect x="-14" y="6" width="28" height="4" rx="2"/>
        </g>
      </g>
    </g>

    <!-- Center node -->
    <g transform="translate(484 283)" filter="url(#centerGlow)">
      <circle r="32" fill="url(#centerBody)" class="nodeCircle" stroke="rgba(90,140,255,.22)" stroke-width="1.2"/>
      <circle r="32" fill="url(#centerHi)" opacity=".9"/>
      <!-- chart line -->
      <path d="M-18 18 L-6 0 L2 8 L18 -18" stroke="url(#pnl)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="18" cy="-18" r="4" fill="#ffffff"/>
    </g>

    <!-- Right nodes + labels -->
    <g>
      <g transform="translate(913 247)">
        <circle r="28" fill="url(#nodeBody)" class="nodeCircle"/>
        <circle r="28" fill="url(#nodeHi)" opacity=".9"/>
        <!-- gear-ish -->
        <circle r="8" fill="none" stroke="rgba(255,255,255,.75)" stroke-width="2"/>
        <path d="M0-18 L3-12 L10-10 L12-3 L18 0 L12 3 L10 10 L3 12 L0 18 L-3 12 L-10 10 L-12 3 L-18 0 L-12 -3 L-10 -10 L-3 -12 Z"
              fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.6" opacity=".85"/>
      </g>
      <text x="955" y="252" class="label1">REST API</text>

      <g transform="translate(913 352)">
        <circle r="28" fill="url(#nodeBody)" class="nodeCircle"/>
        <circle r="28" fill="url(#nodeHi)" opacity=".9"/>
        <!-- wifi -->
        <path d="M-14 -2c9-9 19-9 28 0" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="2" stroke-linecap="round"/>
        <path d="M-9 6c6-6 12-6 18 0" fill="none" stroke="rgba(255,255,255,.75)" stroke-width="2" stroke-linecap="round"/>
        <path d="M-3 14c2-2 4-2 6 0" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="0" cy="20" r="3.2" fill="rgba(255,255,255,.80)"/>
      </g>
      <text x="955" y="350" class="label1">Datastream</text>
      <text x="955" y="372" class="label2">(Websocket)</text>
    </g>

    <!-- Vignette -->
    <rect x="0" y="0" width="1100" height="618" class="vignette"/>
  </g>

  <!-- =========================
       NOTIFICATION SCENE
       ========================= -->
  <g class="notScene" opacity="0">
    <!-- Wrap area -->
    <g transform="translate(154 86)">
      <!-- (transparent) container -->
      <rect x="0" y="0" width="792" height="320" rx="22" fill="rgba(0,0,0,0)"/>

      <!-- Card 1 -->
      <g class="card c1" filter="url(#cardShadow)">
        <rect x="0" y="0" width="792" height="84" rx="18" fill="url(#cardBg)" stroke="rgba(255,255,255,.10)"/>
        <circle cx="44" cy="42" r="22" fill="url(#iconBg)" stroke="rgba(255,255,255,.10)"/>
        <!-- pill icon -->
        <g transform="translate(44 42) rotate(-35)">
          <rect x="-6" y="-12" width="12" height="18" rx="6" fill="#39d98a"/>
          <rect x="-6" y="-1" width="12" height="2" fill="rgba(0,0,0,.22)"/>
          <rect x="-4.8" y="-10.5" width="4.5" height="7.5" rx="2.2" fill="rgba(255,255,255,.55)"/>
        </g>

        <text x="84" y="38" font-family="ui-sans-serif,system-ui" font-size="22" font-weight="650" fill="rgba(255,255,255,.88)">New Token</text>
        <circle cx="300" cy="32" r="3" fill="rgba(255,255,255,.35)"/>
        <text x="312" y="38" font-family="ui-sans-serif,system-ui" font-size="14" fill="rgba(255,255,255,.45)">Just now</text>
        <text x="84" y="64" font-family="ui-sans-serif,system-ui" font-size="16" fill="rgba(255,255,255,.55)">Pumpfun</text>
      </g>

      <!-- Card 2 -->
      <g class="card c2" filter="url(#cardShadow)">
        <rect x="0" y="0" width="792" height="84" rx="18" fill="url(#cardBg)" stroke="rgba(255,255,255,.10)"/>
        <circle cx="44" cy="42" r="22" fill="url(#iconBg)" stroke="rgba(255,255,255,.10)"/>
        <!-- R icon -->
        <g transform="translate(44 42)">
          <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="rgba(0,0,0,.22)" stroke="rgba(124,58,237,.9)" stroke-width="1.6"/>
          <text x="-4.5" y="6" font-size="16" font-weight="700" fill="rgba(255,255,255,.75)" font-family="ui-sans-serif,system-ui">R</text>
        </g>

        <text x="84" y="38" font-family="ui-sans-serif,system-ui" font-size="22" font-weight="650" fill="rgba(255,255,255,.88)">Price update for token</text>
        <circle cx="420" cy="32" r="3" fill="rgba(255,255,255,.35)"/>
        <text x="432" y="38" font-family="ui-sans-serif,system-ui" font-size="14" fill="rgba(255,255,255,.45)">Just now</text>
        <text x="84" y="64" font-family="ui-sans-serif,system-ui" font-size="16" fill="rgba(255,255,255,.55)">Raydium</text>
      </g>

      <!-- Card 3 -->
      <g class="card c3" filter="url(#cardShadow)">
        <rect x="0" y="0" width="792" height="84" rx="18" fill="url(#cardBg)" stroke="rgba(255,255,255,.10)"/>
        <circle cx="44" cy="42" r="22" fill="url(#iconBg)" stroke="rgba(255,255,255,.10)"/>
        <!-- plane icon -->
        <g transform="translate(44 42)">
          <path d="M-12 2 L14 -10c2-1 4 1 3 3L7 18c-1 2-4 2-5 0l-4-9-9-4c-2-1-2-4 0-5z"
                fill="#ff5a00" opacity=".95"/>
          <path d="M-1 10 L12 -2" stroke="rgba(0,0,0,.35)" stroke-width="2.2" stroke-linecap="round"/>
        </g>

        <text x="84" y="38" font-family="ui-sans-serif,system-ui" font-size="22" font-weight="650" fill="rgba(255,255,255,.88)">New token</text>
        <circle cx="300" cy="32" r="3" fill="rgba(255,255,255,.35)"/>
        <text x="312" y="38" font-family="ui-sans-serif,system-ui" font-size="14" fill="rgba(255,255,255,.45)">Just now</text>
        <text x="84" y="64" font-family="ui-sans-serif,system-ui" font-size="16" fill="rgba(255,255,255,.55)">LetsBonk.fun</text>
      </g>
    </g>

    <!-- Vignette -->
    <rect x="0" y="0" width="1100" height="618" class="vignette"/>
  </g>
</svg>
